name: Android APK Derleyici

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Kodları Çek
      uses: actions/checkout@v4

    - name: Zip Dosyasını Aç
      run: unzip edgeglow-rgb-notifications.zip -d .

    - name: Java Ayarla
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Gradle'a Çalışma İzni Ver
      run: chmod +x gradlew

    - name: APK Derle
      run: ./gradlew assembleDebug

    - name: APK Dosyasını Çıkart
      uses: actions/upload-artifact@v4
      with:
        name: EdgeGlow-Uygulamam
        path: app/build/outputs/apk/debug/app-debug.apk
